spring.main.banner-mode=OFF
logging.level.root=OFF
logging.level.io.sapl=OFF

# PostgreSQL-Datenbankkonfiguration
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/testdb  # URL f³r die PostgreSQL-Datenbank
spring.r2dbc.username=test  # Benutzername f³r die Datenbankverbindung
spring.r2dbc.password=test  # Passwort f³r die Datenbankverbindung

# Testcontainer-Konfiguration
spring.testcontainers.enabled=true  # Aktiviere die Verwendung von Testcontainern f³r Tests
spring.testcontainers.port.waitStrategy.timeout=120  # Timeout f³r das Warten auf den Testcontainer (in Sekunden)
spring.testcontainers.reuse.disabled=true  # Deaktiviere die Wiederverwendung von Testcontainern f³r jeden Test