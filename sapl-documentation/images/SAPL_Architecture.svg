<!-- SAPL architecture diagram: Client sends access request to PEP, PEP establishes authorization subscription with PDP, PDP subscribes to policies (PRP) and attributes (PIPs connected to Database/API, SSE/WebSocket, Message Broker), PDP aggregates and sends decisions back to PEP, PEP enforces obligations via RAP to access Resource, PAP manages policies in Policy Repository and modifies PDP Configuration -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 740" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#028392"/>
    </marker>
    <marker id="ah-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7bbdbc"/>
    </marker>
    <marker id="ah-rev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#028392"/>
    </marker>
    <path id="cloud" d="M -50,15 C -60,15 -65,5 -60,-5 C -58,-18 -45,-25 -30,-20 C -25,-30 -10,-32 5,-25 C 15,-32 30,-30 40,-22 C 50,-28 65,-22 65,-10 C 68,0 60,12 50,15 Z" fill="#f0fdf4" stroke="#7bbdbc" stroke-width="1"/>
  </defs>

  <rect width="1340" height="740" rx="8" fill="#f8fafc"/>

  <!-- ==================== ROW 1: PEP, RAP, Resource ==================== -->

  <!-- PEP -->
  <rect x="410" y="45" width="230" height="75" rx="8" fill="#028392"/>
  <text x="525" y="77" text-anchor="middle" fill="white" font-size="15" font-weight="600">Policy Enforcement</text>
  <text x="525" y="98" text-anchor="middle" fill="#c4e8e8" font-size="14">Point (PEP)</text>

  <!-- RAP -->
  <rect x="870" y="45" width="200" height="75" rx="8" fill="#e2e8f0" stroke="#7bbdbc" stroke-width="1.5"/>
  <text x="970" y="77" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="500">Resource Access</text>
  <text x="970" y="98" text-anchor="middle" fill="#4a5568" font-size="14">Point (RAP)</text>

  <!-- Resource -->
  <rect x="1170" y="55" width="120" height="55" rx="8" fill="#f0fdf4" stroke="#7bbdbc" stroke-width="1.5"/>
  <text x="1230" y="88" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="500">Resource</text>

  <!-- 1. Client -> PEP -->
  <line x1="40" y1="63" x2="405" y2="63" stroke="#028392" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="220" y="55" text-anchor="middle" fill="#4a5568" font-size="10">1. Client application access request</text>

  <!-- 10. PEP -> Client (return) -->
  <line x1="405" y1="105" x2="45" y2="105" stroke="#028392" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="220" y="130" text-anchor="middle" fill="#4a5568" font-size="10">10. Return value or stream, potentially modified based on decision</text>

  <!-- 8. PEP -> RAP (two-line label above arrow) -->
  <line x1="640" y1="70" x2="865" y2="70" stroke="#028392" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="752" y="52" text-anchor="middle" fill="#4a5568" font-size="10">8. Enforce obligations and advice,</text>
  <text x="752" y="64" text-anchor="middle" fill="#4a5568" font-size="10">perform action</text>

  <!-- 9. RAP -> PEP -->
  <line x1="865" y1="100" x2="645" y2="100" stroke="#028392" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="752" y="118" text-anchor="middle" fill="#4a5568" font-size="10">9. Return value or stream</text>

  <!-- RAP <-> Resource -->
  <line x1="1070" y1="77" x2="1165" y2="77" stroke="#7bbdbc" stroke-width="1.5" marker-end="url(#ah-acc)"/>
  <line x1="1165" y1="87" x2="1075" y2="87" stroke="#7bbdbc" stroke-width="1.5" marker-end="url(#ah-acc)"/>

  <!-- ==================== ROW 2: PRP, PDP, PIP1 ==================== -->

  <!-- PDP -->
  <rect x="410" y="270" width="230" height="90" rx="8" fill="#028392"/>
  <text x="525" y="298" text-anchor="middle" fill="white" font-size="15" font-weight="600">Policy Decision</text>
  <text x="525" y="319" text-anchor="middle" fill="#c4e8e8" font-size="14">Point (PDP)</text>
  <text x="525" y="348" text-anchor="middle" fill="#89c8c8" font-size="9">6. Aggregate subscriptions to decisions</text>

  <!-- PRP -->
  <rect x="40" y="280" width="200" height="60" rx="8" fill="#e2e8f0" stroke="#7bbdbc" stroke-width="1.5"/>
  <text x="140" y="307" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="500">Policy Retrieval</text>
  <text x="140" y="327" text-anchor="middle" fill="#4a5568" font-size="14">Point (PRP)</text>

  <!-- PIP 1 -->
  <rect x="850" y="280" width="200" height="55" rx="25" fill="#e2e8f0" stroke="#7bbdbc" stroke-width="1.5"/>
  <text x="950" y="304" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="500">Policy Information</text>
  <text x="950" y="321" text-anchor="middle" fill="#4a5568" font-size="12">Point (PIP)</text>

  <!-- Cloud 1: Database / API -->
  <use href="#cloud" x="1200" y="307"/>
  <text x="1200" y="302" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="500">Database /</text>
  <text x="1200" y="316" text-anchor="middle" fill="#4a5568" font-size="11">API</text>

  <!-- PIP 2 -->
  <rect x="850" y="415" width="200" height="55" rx="25" fill="#e2e8f0" stroke="#7bbdbc" stroke-width="1.5"/>
  <text x="950" y="439" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="500">Policy Information</text>
  <text x="950" y="456" text-anchor="middle" fill="#4a5568" font-size="12">Point (PIP)</text>

  <!-- Cloud 2: SSE / WebSocket -->
  <use href="#cloud" x="1200" y="442"/>
  <text x="1200" y="435" text-anchor="middle" fill="#1a1a2e" font-size="10" font-weight="500">Server Sent Events</text>
  <text x="1200" y="449" text-anchor="middle" fill="#4a5568" font-size="10">/ WebSocket</text>

  <!-- PIP 3 -->
  <rect x="850" y="545" width="200" height="55" rx="25" fill="#e2e8f0" stroke="#7bbdbc" stroke-width="1.5"/>
  <text x="950" y="569" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="500">Policy Information</text>
  <text x="950" y="586" text-anchor="middle" fill="#4a5568" font-size="12">Point (PIP)</text>

  <!-- Cloud 3: Message Broker -->
  <use href="#cloud" x="1200" y="572"/>
  <text x="1200" y="566" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="500">Message</text>
  <text x="1200" y="580" text-anchor="middle" fill="#4a5568" font-size="11">Broker</text>

  <!-- 2. PEP -> PDP (left side, down) -->
  <path d="M 480 120 V 265" stroke="#028392" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <text x="370" y="190" text-anchor="middle" fill="#4a5568" font-size="10">2. Establish authorization</text>
  <text x="370" y="203" text-anchor="middle" fill="#4a5568" font-size="10">subscription</text>

  <!-- 7. PDP -> PEP (right side, up) -->
  <path d="M 570 270 V 125" stroke="#028392" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <text x="660" y="195" text-anchor="middle" fill="#4a5568" font-size="10">7. Send new decisions when</text>
  <text x="660" y="208" text-anchor="middle" fill="#4a5568" font-size="10">available and different</text>

  <!-- 4. PDP -> PRP -->
  <line x1="410" y1="305" x2="245" y2="305" stroke="#028392" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="327" y="290" text-anchor="middle" fill="#4a5568" font-size="10">4. Subscribe to policies</text>
  <text x="327" y="302" text-anchor="middle" fill="#4a5568" font-size="10">matching the request</text>

  <!-- 5. PDP <-> PIPs (single line, tips at both ends, trunk fans down) -->
  <line x1="645" y1="307" x2="845" y2="307" stroke="#028392" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="660" y1="307" x2="645" y2="307" stroke="#028392" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="760" y1="307" x2="760" y2="572" stroke="#028392" stroke-width="1.5"/>
  <line x1="760" y1="442" x2="845" y2="442" stroke="#028392" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="760" y1="572" x2="845" y2="572" stroke="#028392" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="715" y="282" text-anchor="middle" fill="#4a5568" font-size="10">5. Subscribe to</text>
  <text x="715" y="295" text-anchor="middle" fill="#4a5568" font-size="10">attributes</text>

  <!-- PIP <-> Cloud arrows -->
  <line x1="1050" y1="303" x2="1140" y2="303" stroke="#7bbdbc" stroke-width="1.5" marker-end="url(#ah-acc)"/>
  <line x1="1140" y1="313" x2="1055" y2="313" stroke="#7bbdbc" stroke-width="1.5" marker-end="url(#ah-acc)"/>

  <line x1="1050" y1="438" x2="1140" y2="438" stroke="#7bbdbc" stroke-width="1.5" marker-end="url(#ah-acc)"/>
  <line x1="1140" y1="448" x2="1055" y2="448" stroke="#7bbdbc" stroke-width="1.5" marker-end="url(#ah-acc)"/>

  <line x1="1050" y1="568" x2="1140" y2="568" stroke="#7bbdbc" stroke-width="1.5" marker-end="url(#ah-acc)"/>
  <line x1="1140" y1="578" x2="1055" y2="578" stroke="#7bbdbc" stroke-width="1.5" marker-end="url(#ah-acc)"/>

  <!-- ==================== ROW 3: Policy Repo, PDP Config, PAP ==================== -->

  <!-- Policy Repository (cylinder, top-open, bottom arc only) -->
  <rect x="70" y="450" width="140" height="65" fill="#e2e8f0" stroke="none"/>
  <path d="M 70 515 A 70 12 0 0 0 210 515" fill="#dde4ed" stroke="#7bbdbc" stroke-width="1.5"/>
  <line x1="70" y1="450" x2="70" y2="515" stroke="#7bbdbc" stroke-width="1.5"/>
  <line x1="210" y1="450" x2="210" y2="515" stroke="#7bbdbc" stroke-width="1.5"/>
  <ellipse cx="140" cy="450" rx="70" ry="12" fill="#e2e8f0" stroke="#7bbdbc" stroke-width="1.5"/>
  <text x="140" y="483" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="500">Policy</text>
  <text x="140" y="500" text-anchor="middle" fill="#4a5568" font-size="13">Repository</text>

  <!-- PDP Configuration (cylinder, top-open, bottom arc only) -->
  <rect x="440" y="505" width="170" height="65" fill="#e2e8f0" stroke="none"/>
  <path d="M 440 570 A 85 12 0 0 0 610 570" fill="#dde4ed" stroke="#7bbdbc" stroke-width="1.5"/>
  <line x1="440" y1="505" x2="440" y2="570" stroke="#7bbdbc" stroke-width="1.5"/>
  <line x1="610" y1="505" x2="610" y2="570" stroke="#7bbdbc" stroke-width="1.5"/>
  <ellipse cx="525" cy="505" rx="85" ry="12" fill="#e2e8f0" stroke="#7bbdbc" stroke-width="1.5"/>
  <text x="525" y="538" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="500">PDP</text>
  <text x="525" y="555" text-anchor="middle" fill="#4a5568" font-size="13">Configuration</text>

  <!-- PRP <-> Policy Repository -->
  <line x1="130" y1="340" x2="130" y2="435" stroke="#7bbdbc" stroke-width="1.5" marker-end="url(#ah-acc)"/>
  <line x1="150" y1="435" x2="150" y2="345" stroke="#7bbdbc" stroke-width="1.5" marker-end="url(#ah-acc)"/>

  <!-- 3. PDP Config -> PDP -->
  <path d="M 525 493 V 365" stroke="#028392" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <text x="545" y="420" text-anchor="start" fill="#4a5568" font-size="10">3. Subscribe to PDP</text>
  <text x="545" y="433" text-anchor="start" fill="#4a5568" font-size="10">configuration</text>

  <!-- PAP -->
  <rect x="40" y="640" width="200" height="60" rx="8" fill="#e2e8f0" stroke="#7bbdbc" stroke-width="1.5"/>
  <text x="140" y="667" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="500">Policy Administration</text>
  <text x="140" y="687" text-anchor="middle" fill="#4a5568" font-size="14">Point (PAP)</text>

  <!-- PAP -> Policy Repository -->
  <path d="M 140 640 V 530" stroke="#028392" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <text x="155" y="585" text-anchor="start" fill="#4a5568" font-size="10">Manage policies</text>

  <!-- PAP -> PDP Configuration (L-shape: right then up to center bottom of cylinder) -->
  <path d="M 240 670 H 525 V 585" stroke="#028392" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <text x="380" y="663" text-anchor="middle" fill="#4a5568" font-size="10">Modify configuration</text>
</svg>
