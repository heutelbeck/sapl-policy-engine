# nfpm configuration for SAPL Node DEB and RPM packages.
#
# The VERSION, ARCH, and BINARY environment variables are set by the CI
# publish job. Run locally with:
#
#   VERSION=4.0.0 ARCH=amd64 BINARY=./sapl nfpm package --packager deb --target .
#   VERSION=4.0.0 ARCH=amd64 BINARY=./sapl nfpm package --packager rpm --target .

name: sapl
version: ${VERSION}
arch: ${ARCH}
platform: linux
maintainer: Dominic Heutelbeck <dominic@heutelbeck.com>
description: SAPL Node PDP server and policy management CLI
vendor: SAPL
homepage: https://github.com/heutelbeck/sapl-policy-engine
license: Apache-2.0
section: admin

contents:
  - src: ${BINARY}
    dst: /usr/bin/sapl
    expand: true
    file_info:
      mode: 0755

  - src: sapl-node/packaging/sapl.service
    dst: /usr/lib/systemd/system/sapl.service
    type: config|noreplace

  - src: sapl-node/packaging/default-config.yml
    dst: /etc/sapl/application.yml
    type: config|noreplace

  - dst: /var/lib/sapl
    type: dir
    file_info:
      mode: 0750
      owner: sapl
      group: sapl

  - src: sapl-node/packaging/README
    dst: /var/lib/sapl/README
    file_info:
      mode: 0644
      owner: sapl
      group: sapl

  - src: sapl-node/packaging/example/pdp.json
    dst: /var/lib/sapl/example/pdp.json
    file_info:
      mode: 0644
      owner: sapl
      group: sapl

  - src: sapl-node/packaging/example/deny-all.sapl
    dst: /var/lib/sapl/example/deny-all.sapl
    file_info:
      mode: 0644
      owner: sapl
      group: sapl

  - src: sapl-node/packaging/example/deny-write.sapl
    dst: /var/lib/sapl/example/deny-write.sapl
    file_info:
      mode: 0644
      owner: sapl
      group: sapl

scripts:
  preinstall: sapl-node/packaging/preinstall.sh
  postinstall: sapl-node/packaging/postinstall.sh
  preremove: sapl-node/packaging/preremove.sh
