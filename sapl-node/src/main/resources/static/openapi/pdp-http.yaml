openapi: 3.1.0
info:
  title: SAPL PDP Native HTTP API
  version: "1"
  description: |
    The native SAPL Policy Decision Point HTTP transport at `/api/pdp/*`.

    These endpoints bypass Spring's `DispatcherServlet` and are served by
    `HttpServlet` implementations registered via `ServletRegistrationBean`.
    The bypass eliminates MVC processing overhead from the per-request hot
    path so this transport runs roughly an order of magnitude faster than
    a Spring MVC controller would on the same engine.

    Five routes are exposed:

    | Path | Body | Response | Shape |
    |---|---|---|---|
    | `POST /api/pdp/decide-once` | `AuthorizationSubscription` | `AuthorizationDecision` | one-shot |
    | `POST /api/pdp/multi-decide-all-once` | `MultiAuthorizationSubscription` | `MultiAuthorizationDecision` | one-shot bundle |
    | `POST /api/pdp/decide` | `AuthorizationSubscription` | stream of `AuthorizationDecision` | SSE |
    | `POST /api/pdp/multi-decide` | `MultiAuthorizationSubscription` | stream of `IdentifiableAuthorizationDecision` | SSE per sub |
    | `POST /api/pdp/multi-decide-all` | `MultiAuthorizationSubscription` | stream of `MultiAuthorizationDecision` | SSE bundled |

    Streaming responses use `text/event-stream`. Each event is one line of
    `data:<json>\n\n`. Idle connections may receive `: keep-alive\n\n`
    comment frames at the configured interval. The stream stays open until
    the client disconnects or the underlying SAPL stream terminates.

    Authentication is handled inside the servlet (see
    `io.sapl.node.http.auth.HttpAuthHandler`) using the same Basic / API
    key / JWT mechanisms the Spring chain uses, plus the optional
    `allow-no-auth: true` shortcut. The Spring Security filter chain
    explicitly excludes `/api/pdp/**` (see
    `SecurityConfiguration.pdpEndpointSecurityBypass`) because the bypass
    handles auth itself.

tags:
  - name: SAPL Authorization API
    description: |
      Native SAPL PDP HTTP transport at `/api/pdp/*`. Two operation
      shapes share the same surface: one-shot routes return a single
      JSON response, streaming routes hold the connection open and emit
      `text/event-stream` events as decisions change.

paths:

  /api/pdp/decide-once:
    post:
      tags: [SAPL Authorization API]
      summary: Evaluate a single authorization subscription and return one decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizationSubscription"
      responses:
        "200":
          description: Authorization decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationDecision"
        "400": { $ref: "#/components/responses/MalformedSubscription" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/pdp/multi-decide-all-once:
    post:
      tags: [SAPL Authorization API]
      summary: Evaluate a bundle of subscriptions and return one decision per subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultiAuthorizationSubscription"
      responses:
        "200":
          description: Bundle of decisions keyed by subscription id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultiAuthorizationDecision"
        "400": { $ref: "#/components/responses/MalformedSubscription" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/pdp/decide:
    post:
      tags: [SAPL Authorization API]
      summary: Open a Server-Sent Event stream of decisions for a single subscription
      description: |
        The body of each event is a JSON-serialised
        `AuthorizationDecision`. The stream emits whenever the decision
        changes (combined attribute snapshot, policy reload, etc.) and
        stays open until the client disconnects.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizationSubscription"
      responses:
        "200":
          description: |
            Server-Sent Event stream. Each `data:` event carries one
            `AuthorizationDecision` JSON document. Idle connections receive
            `: keep-alive\n\n` comment frames at the configured interval.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/AuthorizationDecision"
        "400": { $ref: "#/components/responses/MalformedSubscription" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/pdp/multi-decide:
    post:
      tags: [SAPL Authorization API]
      summary: SSE stream of per-subscription decision changes for a subscription bundle
      description: |
        Each event carries an `IdentifiableAuthorizationDecision` so the
        client can correlate the decision with the originating
        subscription id. The same subscription id may emit multiple times
        as its decision changes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultiAuthorizationSubscription"
      responses:
        "200":
          description: |
            Server-Sent Event stream. Each `data:` event carries one
            `IdentifiableAuthorizationDecision` JSON document. The same
            subscription id may emit multiple times as its decision
            changes.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/IdentifiableAuthorizationDecision"
        "400": { $ref: "#/components/responses/MalformedSubscription" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/pdp/multi-decide-all:
    post:
      tags: [SAPL Authorization API]
      summary: SSE stream of bundled decisions for a subscription bundle
      description: |
        Each event carries a full `MultiAuthorizationDecision`
        representing the current decision for every subscription in the
        bundle. The stream emits glitch-free; one event per consistent
        snapshot regardless of how many underlying attributes changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultiAuthorizationSubscription"
      responses:
        "200":
          description: |
            Server-Sent Event stream. Each `data:` event carries one
            `MultiAuthorizationDecision` JSON document representing the
            current decision for every subscription in the bundle.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/MultiAuthorizationDecision"
        "400": { $ref: "#/components/responses/MalformedSubscription" }
        "401": { $ref: "#/components/responses/Unauthorized" }

components:

  responses:
    MalformedSubscription:
      description: Request body is not a valid subscription JSON document
    Unauthorized:
      description: Authentication required or invalid credentials

  schemas:

    Decision:
      type: string
      enum: [PERMIT, DENY, SUSPEND, INDETERMINATE, NOT_APPLICABLE]
      description: |
        Authorization verb. SAPL extends the XACML/OpenID set with `SUSPEND`
        (decision deferred; client should re-evaluate later) and
        `NOT_APPLICABLE` (no policy matched).

    AuthorizationSubscription:
      type: object
      required: [subject, action, resource]
      properties:
        subject:
          description: Entity requesting permission. Any JSON value.
        action:
          description: Operation the subject wants to perform. Any JSON value.
        resource:
          description: Target of the operation. Any JSON value.
        environment:
          description: Optional contextual information. Any JSON value or omitted.
        secrets:
          type: object
          description: Optional object whose entries are accessible to policies via `secrets()` and not echoed back in responses.
      example:
        subject: "alice"
        action: "read"
        resource: "doc-42"
        environment:
          ip: "10.0.0.1"

    AuthorizationDecision:
      type: object
      required: [decision, obligations, advice, resource]
      properties:
        decision:
          $ref: "#/components/schemas/Decision"
        obligations:
          type: array
          description: Constraints the PEP must enforce for the decision to be valid.
          items: {}
        advice:
          type: array
          description: Recommendations the PEP should consider; non-enforcement.
          items: {}
        resource:
          description: |
            Potentially transformed resource. Absent/undefined when the policy
            did not rewrite the resource.
      example:
        decision: PERMIT
        obligations: []
        advice: []
        resource: {}

    MultiAuthorizationSubscription:
      type: object
      required: [subscriptions]
      properties:
        subscriptions:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AuthorizationSubscription"
          description: Map of subscription id to subscription.
      example:
        subscriptions:
          alice-read:
            subject: "alice"
            action: "read"
            resource: "doc-42"
          bob-write:
            subject: "bob"
            action: "write"
            resource: "doc-42"

    MultiAuthorizationDecision:
      type: object
      required: [decisions]
      properties:
        decisions:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AuthorizationDecision"
          description: Map of subscription id to decision.
      example:
        decisions:
          alice-read:
            decision: PERMIT
            obligations: []
            advice: []
            resource: {}
          bob-write:
            decision: DENY
            obligations: []
            advice: []
            resource: {}

    IdentifiableAuthorizationDecision:
      type: object
      required: [subscriptionId, decision]
      properties:
        subscriptionId:
          type: string
          description: Id of the originating subscription within the bundle.
        decision:
          $ref: "#/components/schemas/AuthorizationDecision"
      example:
        subscriptionId: "alice-read"
        decision:
          decision: PERMIT
          obligations: []
          advice: []
          resource: {}
