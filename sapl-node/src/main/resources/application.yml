#
# SAPL Node Configuration
#
# This file configures the SAPL Node with safe, functional defaults.
# The node starts on localhost:8080 without TLS and without authentication,
# serving deny-by-default decisions. Drop .sapl files in the current
# directory to start making authorization decisions.
#
# Security progression:
#   Level 0: Out of the box (localhost, no TLS, no auth, deny-by-default)
#   Level 1: Add authentication (API key or basic auth)
#   Level 2: Add TLS (bind to 0.0.0.0 or specific interface)
#   Level 3: Production hardening (TLS + auth + metrics + bundle signing)
#

spring:
  application.name: sapl
  # Per-request HTTP observation adds ~6% CPU on the bypass servlet path.
  # Remove this exclude to enable HTTP request metrics for ops dashboards.
  autoconfigure:
    exclude:
      - org.springframework.boot.webmvc.autoconfigure.WebMvcObservationAutoConfiguration
  threads:
    virtual:
      enabled: true
  config:
    import: optional:classpath:git.properties
  cache:
    type: caffeine
    caffeine:
      # expireAfterWrite is the auth revocation SLA: a revoked API key keeps working until its
      # cache entry expires. 5m matches io.sapl.node.http.auth-cache.positive-ttl so both stacks agree.
      spec: maximumSize=1000,expireAfterWrite=5m,recordStats
    cache-names:
      - ApiKeyCache
      - buckets

# --- Server ---

# Event loop threads. Default = availableProcessors() (includes HT).
# For throughput tuning, set to physical core count instead.
# reactor.netty.ioWorkerCount: 16

server:
  address: 127.0.0.1
  port: 8080
  jetty:
    threads:
      # Default 200 queues under high-RPS load on multi-core hosts.
      max: 512
  ssl:
    enabled: false
    # Uncomment and configure to enable TLS:
    # key-store-type: PKCS12
    # key-store: file:/path/to/keystore.p12
    # key-store-password: changeme
    # key-password: changeme
    # key-alias: sapl-node
    #
    # The cipher list and protocol settings below are inactive while
    # ssl.enabled is false. They are kept here so that flipping
    # ssl.enabled to true yields a known-good baseline.
    # The cipher set originates from a Qualys SSL Labs audit of a
    # running SAPL Node and is more than two years old at the time of
    # writing. Re-audit before relying on it in a fresh deployment.
    ciphers:
      - TLS_AES_128_GCM_SHA256
      - TLS_AES_256_GCM_SHA384
      - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
      - TLS_DHE_RSA_WITH_AES_256_GCM_SHA384
      - TLS_DHE_RSA_WITH_AES_128_GCM_SHA256
      - TLS_DHE_DSS_WITH_AES_256_GCM_SHA384
      - TLS_DHE_DSS_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA384
      - TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA256
      - TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA384
      - TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256
      - TLS_DHE_RSA_WITH_AES_256_CBC_SHA256
      - TLS_DHE_RSA_WITH_AES_128_CBC_SHA256
      - TLS_DHE_DSS_WITH_AES_256_CBC_SHA256
      - TLS_DHE_DSS_WITH_AES_128_CBC_SHA256
    enabled-protocols:
      - TLSv1.3
      - TLSv1.2
    protocol: TLSv1.3

# --- Client Authentication ---
#
# The node supports four authentication modes. Multiple can be enabled
# simultaneously. By default the node ships with all four modes disabled
# (fail-closed) and refuses to start until at least one is configured.
#
# For local exploration, set `allow-no-auth: true` to accept unauthenticated
# requests against the default PDP. Production deployments configure one or
# more of `allow-basic-auth`, `allow-api-key-auth`, `allow-oauth2-auth` and
# the corresponding credentials.

io.sapl:
  node:
    allow-no-auth: false
    allow-basic-auth: false
    allow-api-key-auth: false
    allow-oauth2-auth: false

    # PDP ID routing (multi-tenant)
    # reject-on-missing-pdp-id: false
    # default-pdp-id: "default"

    # OAuth2 settings (only relevant if allow-oauth2-auth is true).
    # pdp-id-claim accepts a claim name or a dot-separated path into
    # nested claims (an exact top-level claim wins over path reading).
    # audiences and required-scopes are opt-in access gates: when set, a
    # token must carry one of the listed aud values / scopes (scope or
    # scp claim) or it is rejected. Set at least one on a shared IdP,
    # otherwise any valid token from the issuer grants PDP access.
    # oauth:
    #   pdp-id-claim: "sapl_pdp_id"
    #   audiences:
    #     - "sapl-pdp"
    #   required-scopes:
    #     - "sapl:pdp"

    # Scalar OAuth2 client id (optional). When set, the Scalar Authorize
    # dialog presents this id as the suggested OIDC client. Independent
    # of whether OAuth2 is enabled server-side; effective only when
    # allow-oauth2-auth is true.
    # scalar:
    #   oauth-client-id: "sapl-node-scalar"

    # OpenID Authorization API 1.0 binding at /access/v1/evaluation.
    # openid-authz-api:
    #   enabled: true

    # User entries for Basic Auth and API Key authentication.
    # Each user is associated with a pdp-id for multi-tenant routing.
    #
    # Generate credentials:
    #   sapl generate basic --id "my-client" --pdp-id "production"
    #   sapl generate apikey --id "my-client" --pdp-id "staging"
    #
    # users:
    #   - id: "my-basic-client"
    #     pdp-id: "default"
    #     basic:
    #       username: "my-username"
    #       secret: "$argon2id$..."
    #
    #   - id: "my-apikey-client"
    #     pdp-id: "default"
    #     api-key-id: "<10-char-id-from-generator>"
    #     api-key: "$argon2id$..."

    # --- Keep-Alive ---
    #
    # Interval in seconds between keep-alive comment frames on idle SSE
    # streams. Prevents proxies and firewalls from dropping inactive
    # connections and lets the server detect clients that drop without
    # closing. Always on; default 15 seconds (values below 1 are raised).
    keep-alive: 15

    # Maximum number of entries accepted in a MultiAuthorizationSubscription
    # on public HTTP and RSocket PDP endpoints.
    max-multi-subscription-count: 256

    # --- Admission Limits and Rate Limiting ---
    #
    # Optional global caps on concurrent streams and connections and global
    # rate limits on unary requests. All default to 0, meaning unbounded.
    # HTTP requests beyond a cap receive 503, requests beyond a rate
    # receive 429, both with a Retry-After header. RSocket connections and
    # requests beyond a limit receive the retriable REJECTED_SETUP and
    # REJECTED errors. Every rejection increments the
    # sapl.limits.rejections counter and logs a rate limited warning.
    #
    # limits:
    #   http:
    #     sse:
    #       max-concurrent-streams: 10000
    #     requests-per-second: 50000
    #   rsocket:
    #     max-connections: 1000
    #     max-streams-per-connection: 10000
    #     requests-per-second: 50000

  # --- PDP Policy Source ---
  #
  # pdp-config-type options:
  #   DIRECTORY        - Monitor a directory for pdp.json and *.sapl files
  #   MULTI_DIRECTORY  - Subdirectories as tenants (subdir name = pdp-id)
  #   RESOURCES        - Load from classpath (fixed, no runtime updates)
  #   BUNDLES          - Monitor directory for .saplbundle files
  #   REMOTE_BUNDLES   - Fetch .saplbundle files from HTTP server

  pdp.embedded:
    enabled: true
    pdp-config-type: DIRECTORY
    config-path: .
    policies-path: .
    metrics-enabled: true

    # --- Decision Reporting ---
    # print-trace: false
    # print-json-report: false
    # print-text-report: false
    # pretty-print-reports: false
    # print-subscription-events: false
    # print-unsubscription-events: false

    # --- Bundle Security ---
    #
    # Required when pdp-config-type is BUNDLES or REMOTE_BUNDLES.
    #
    # bundle-security:
    #   # Option 1: Global public key (all bundles verified with this key)
    #   public-key-path: /path/to/ed25519-public-key.pem
    #
    #   # Option 2: Per-tenant key catalogue
    #   keys:
    #     prod-key-2025: "MCowBQYDK2VwAyEA..."
    #     staging-key: "MCowBQYDK2VwAyEA..."
    #   tenants:
    #     production:
    #       - "prod-key-2025"
    #     staging:
    #       - "staging-key"
    #
    #   # Option 3: Allow unsigned bundles (development only)
    #   allow-unsigned: true
    #   unsigned-tenants:
    #     - "development"
    #   # SECURITY: never combine allow-unsigned or unsigned-tenants with
    #   # REMOTE_BUNDLES. A network-fetched unsigned bundle can be replaced in
    #   # transit to inject arbitrary policy. Use only with local trusted sources.

    # --- Remote Bundles ---
    #
    # Required when pdp-config-type is REMOTE_BUNDLES.
    #
    # remote-bundles:
    #   base-url: https://pap.example.com/bundles
    #   pdp-ids:
    #     - default
    #   mode: POLLING
    #   poll-interval: 5s
    #   # long-poll-timeout: 30s
    #   # auth-header-name: Authorization
    #   # auth-header-value: "Bearer <token>"
    #   # allow-insecure-http: false
    #   # follow-redirects: true
    #   # Transport freshness: mark a pdpId stale after this long without a
    #   # successful contact (default derived from the poll cadence).
    #   # stale-after-no-contact: 60s
    #   # Fail closed (deny) after this long without contact. Off by default.
    #   # When set it must be greater than stale-after-no-contact.
    #   # fail-closed-after-no-contact: 300s

# --- API Documentation (Scalar UI on top of springdoc-generated OpenAPI) ---

springdoc:
  show-actuator: true
  paths-to-exclude:
    - /
    - /scalar
    - /scalar/**

scalar:
  url: /v3/api-docs
  page-title: SAPL Node API
  favicon: /favicon.png
  show-developer-tools: never
  # SAPL theme is loaded from classpath:static/css/sapl-scalar-theme.css
  # and applied per request via ScalarConfiguration#scalarWebMvcController.
  with-default-fonts: false
  # disable Ask AI in scalar
  agent:
    disabled: true

# --- OAuth2 Resource Server ---
#
# Required when allow-oauth2-auth is true.
#
# spring.security.oauth2:
#   resourceserver:
#     jwt.issuer-uri: https://your-auth-server/realms/your-realm

# --- Side-Loading Extensions ---
#
# Add function libraries and PIPs from external JARs.
# Beans in sub-packages of io.sapl.server or with matching
# Spring auto-configuration will be loaded at startup.
#
# loader.path: /path/to/lib

# --- RSocket (Protobuf) ---
#
# High-performance binary transport using RSocket with protobuf serialization.
# Enabled by default, listening on 127.0.0.1:7000. Clients connect via
# RemotePolicyDecisionPoint.builder().rsocket(). Disable explicitly when the
# endpoint is unused, for example in container layouts that publish only the
# HTTP/JSON port.
#
# Like server.address, the RSocket transport binds to 127.0.0.1 by default so
# the cleartext protobuf endpoint is not reachable from other hosts out of the
# box. To accept remote connections, set sapl.pdp.rsocket.address to 0.0.0.0 (or
# a specific interface) and enable TLS via sapl.pdp.rsocket.ssl.bundle. The
# docker profile sets the address to 0.0.0.0 so the container is reachable.
#
# sapl.pdp.rsocket:
#   enabled: false
#   address: 127.0.0.1
#   port: 7000

# --- Rate Limiting ---

bucket4j:
  enabled: false
  filters:
    - id: filter1
      cache-name: buckets
      filter-method: servlet
      url: .*
      http-content-type: application/json;charset=UTF-8
      filter-order: 1
      rate-limits:
        - bandwidths:
            - capacity: 10000
              time: 1
              unit: seconds
  cache-to-use: caffeine

# --- Actuator Endpoints ---

management:
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# --- Logging ---

logging.level:
  "[io.sapl]": INFO
  "[org.springframework]": INFO
  # GraalVM native image emits a one-shot WARN from this binder about
  # unavailable GC notification listeners. Set to ERROR here so the
  # native build is quiet. Verified no-op on HotSpot (this binder does
  # not log at INFO/WARN there today). If a future micrometer version
  # starts logging meaningful WARN/INFO from this binder on JVM, lift
  # this filter or move it under a native-only profile.
  "[io.micrometer.core.instrument.binder.jvm.JvmGcMetrics]": ERROR
  "[org.springdoc.api.AbstractOpenApiResource]": WARN
