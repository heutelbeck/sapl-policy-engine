name: Testing and Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    paths-ignore:
      - 'sapl-documentation/**'
      - '.github/workflows/**'
      - '!.github/workflows/build.yml'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'sapl-documentation/**'
      - '.github/workflows/**'
      - '!.github/workflows/build.yml'
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Phase 1: Build and Test (parallel)
  # ---------------------------------------------------------------------------

  version-check:
    name: Check Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is_snapshot: ${{ steps.get-version.outputs.is_snapshot }}
      is_tag: ${{ steps.check-ref.outputs.is_tag }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Extract Version
        id: get-version
        run: |
          VERSION=$( mvn help:evaluate -Dexpression=project.version -q -DforceStdout )
          if [ -z "$VERSION" ]; then
            echo "ERROR: Failed to extract version"
            exit 1
          fi
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Ref Type
        id: check-ref
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clean up Local Repository before Caching
        run: rm -rf ~/.m2/repository/io/sapl

  test:
    strategy:
      matrix:
        java: [ '21', '25' ]
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    name: Test (JDK ${{ matrix.java }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      checks: write
    timeout-minutes: 60

    env:
      RUN_ANALYSIS: ${{ (matrix.os == 'ubuntu-latest') && (matrix.java == '25') }}
      IS_FORK: ${{ github.event.pull_request.head.repo.fork || (github.actor == 'dependabot[bot]') }}

    steps:
      - name: Harden Runner
        if: matrix.os == 'ubuntu-latest'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: ${{ (env.IS_FORK == 'true') && 50 || 0 }}

      - name: Dependency Review
        if: ${{ (env.RUN_ANALYSIS == 'true') && (github.event_name == 'pull_request') }}
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Dependencies of SAPL Node
        if: env.RUN_ANALYSIS == 'true'
        run: mvn -U -B install -pl sapl-node -am -Dmaven.test.skip=true

      - name: Build SAPL Node Image
        if: env.RUN_ANALYSIS == 'true'
        run: mvn -B spring-boot:build-image -pl sapl-node -Dmaven.test.skip=true

      - name: Run Unit Tests Only
        if: env.RUN_ANALYSIS == 'false'
        run: mvn -B package javadoc:jar

        # Runs JaCoCo and Spotbugs analysis which are needed for the subsequent
        # SonarCloud analysis. The SonarCloud analysis is run separately because a
        # distinction has to be made between workflows triggered by pull requests from a
        # fork and workflows triggered by other events.
      - name: Run Unit Tests, Analysis, and Integration Tests
        if: env.RUN_ANALYSIS == 'true'
        run: mvn -B verify javadoc:jar spotbugs:spotbugs -pl '!sapl-bom,!sapl-code-style' -Pcoverage,it,spotbugs -T 1.5C

      - name: Cache Sonar Packages
        if: ${{ (env.RUN_ANALYSIS == 'true') && (env.IS_FORK == 'false') }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

        # SonarCloud analysis with full coverage and SpotBugs data.
        # The quality gate is enforced here (sonar.qualitygate.wait=true).
      - name: Run SonarCloud Analysis with Coverage
        if: ${{ (env.RUN_ANALYSIS == 'true') && (env.IS_FORK == 'false') }}
        env:
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}
        run: >
          mvn -B sonar:sonar
          -pl '!sapl-bom,!sapl-code-style'
          -Dsonar.organization=heutelbeck
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.projectKey=heutelbeck_sapl-policy-engine
          -Dsonar.java.spotbugs.reportPaths=target/spotbugsXml.xml
          -Dsonar.qualitygate.wait=true
          -Pproduction

        # The two following steps "Save PR Number" and "Upload Artifact" are needed for a
        # SonarCloud analysis for pull requests from forks. Workflows triggered by pull
        # requests from forks cannot access repository secrets. And a SonarCloud analysis
        # cannot be run without a secret SonarCloud token. The information and files
        # needed for a SonarCloud analysis are thus uploaded as an artifact and used in a
        # subsequent SonarCloud analysis workflow triggered by the conclusion of the
        # current workflow.
      - name: Save PR Number
        if: ${{ (env.RUN_ANALYSIS == 'true') && (env.IS_FORK == 'true') }}
        run: echo "${{ github.event.number }}" > pr_data.txt

        # See comment on previous step "Save PR Number".
        # An artifact is uploaded for a subsequent SonarCloud analysis. For its standard
        # analysis of Maven projects, SonarCloud needs the pom.xml, the java classes, the
        # compiled classes as well as the scm information (.git).
        # To include coverage information and spotbugs issues in the analysis, the
        # respective reports are needed.
        # To limit its analysis to the pull request that triggered this workflow, the pull
        # request's number is needed.
      - name: Upload Artifact
        if: ${{ (env.RUN_ANALYSIS == 'true') && (env.IS_FORK == 'true') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr_build
          path: |
            pom.xml
            **/pom.xml
            **/src
            **/target/classes
            **/target/test-classes
            .git
            !.git/config
            !.git/credentials
            !.git/**/config
            **/target/site/jacoco/jacoco.xml
            **/target/spotbugsXml.xml
            pr_data.txt
            **/META-INF
            **/*.target
            **/category.xml
            **/feature.xml
            **/plugin.xml
          retention-days: 1

        # This action currently contains a bug. If a commit triggers more than one workflow
        # run all test reports are published on the first workflow run.
        # See: https://github.com/ScaCap/action-surefire-report/issues/75
      - name: Publish Test Report
        if: ${{ (success() || failure()) && (env.RUN_ANALYSIS == 'true') && (env.IS_FORK == 'false') }}
        uses: scacap/action-surefire-report@3dacff26879cd2a7f2160d101254032a3707fe6f # v1.12.0

      - name: Clean up Local Repository before Caching
        shell: bash
        run: rm -rf ~/.m2/repository/io/sapl

  build-docker:
    if: ${{ github.event_name != 'pull_request' }}
    needs: [version-check]
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
          server-id: central
          server-username: NEXUS_USERNAME
          server-password: NEXUS_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure Servers
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          githubServer: false
          servers: |
            [{
              "id": "central",
              "username": "${{ secrets.NEXUS_USERNAME }}",
              "password": "${{ secrets.NEXUS_PASSWORD }}"
            }, {
              "id": "github",
              "username": "${{ secrets.GHUB_USERNAME }}",
              "password": "${{ secrets.GHUB_ACCESS_TOKEN }}"
            }]

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build All for Server
        run: mvn -U -B clean install -Dmaven.test.skip=true -Psign,production -T 1.5C
        env:
          MAVEN_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.NEXUS_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build SAPL Node Image
        run: mvn -B spring-boot:build-image -pl sapl-node -Dmaven.test.skip=true

      - name: Build SAPL Playground Image
        run: mvn -B spring-boot:build-image -pl sapl-playground -Dmaven.test.skip=true -Pproduction

      - name: Save SAPL Node Image
        run: docker save ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }} | gzip > sapl-node-docker-image.tar.gz

      - name: Save SAPL Playground Image
        run: docker save ghcr.io/heutelbeck/sapl-playground:${{ needs.version-check.outputs.version }} | gzip > sapl-playground-docker-image.tar.gz

      - name: Upload Docker Image Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-images
          path: |
            sapl-node-docker-image.tar.gz
            sapl-playground-docker-image.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Upload SAPL Node JAR Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sapl-node-jars
          if-no-files-found: error
          path: |
            sapl-node/target/sapl-node-*.jar
            sapl-node/target/sapl-node-*.jar.asc
            sapl-node/target/sapl-node-*.jar.sha1
            sapl-node/target/sapl-node-*.jar.md5
            sapl-node/target/classes/META-INF/sbom/application.cdx.json
            sapl-node/target/site/io.*.spdx.json
          retention-days: 1

      - name: Clean up Local Repository before Caching
        run: rm -rf ~/.m2/repository/io/sapl

  build-native-node:
    needs: [version-check]
    if: ${{ github.event_name != 'pull_request' }}
    permissions:
      contents: read
    uses: ./.github/workflows/build_native_node.yml
    with:
      build_macos: ${{ needs.version-check.outputs.is_tag == 'true' }}

  build-native-lsp:
    if: ${{ github.event_name != 'pull_request' }}
    permissions:
      contents: read
    uses: ./.github/workflows/build_native_lsp.yml

  smoke-test-native-node:
    needs: [build-native-node]
    if: ${{ github.event_name != 'pull_request' }}
    name: Smoke Test Native SAPL Node
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .github/scripts/native-node-smoke-test.sh
          sparse-checkout-cone-mode: false

      - name: Download Linux amd64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-linux-amd64
          path: artifacts/linux-amd64

      - name: Run smoke test against the native binary
        run: |
          chmod +x artifacts/linux-amd64/sapl
          .github/scripts/native-node-smoke-test.sh ./artifacts/linux-amd64/sapl

  benchmark-scripts-test:
    needs: [smoke-test-native-node]
    if: ${{ github.event_name != 'pull_request' }}
    name: Benchmark Scripts Regression Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 40

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Maven packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Install wrk2 (HTTP load generator)
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev
          # wrk2 has no apt package and no tagged releases. Fetch exactly this
          # commit (not a moving branch) so a later wrk2 push cannot change it.
          # Update WRK2_SHA deliberately when bumping.
          WRK2_SHA=44a94c17d8e6a0bac8559b53da76848e430cb7a7
          git init "$RUNNER_TEMP/wrk2"
          git -C "$RUNNER_TEMP/wrk2" fetch --depth 1 https://github.com/giltene/wrk2.git "$WRK2_SHA"
          git -C "$RUNNER_TEMP/wrk2" checkout FETCH_HEAD
          make -C "$RUNNER_TEMP/wrk2"
          sudo install "$RUNNER_TEMP/wrk2/wrk" /usr/local/bin/wrk2

      - name: Download Linux amd64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-linux-amd64
          path: artifacts/linux-amd64

      - name: Build benchmark JVM jars and run the script regression test
        shell: bash
        run: |
          mkdir -p sapl-benchmark/bin
          # Reuse the native binary from build-native-node. This job uses temurin,
          # so build.sh finds no native-image and builds only the JVM jars, leaving
          # this binary untouched. The native image is never rebuilt here.
          cp artifacts/linux-amd64/sapl sapl-benchmark/bin/sapl
          chmod +x sapl-benchmark/bin/sapl
          ./sapl-benchmark/scripts/build.sh
          env BENCH_QUALITIES=test ./sapl-benchmark/scripts/run-all.sh "$RUNNER_TEMP/bench-results"

  build-min-docker:
    needs: [version-check, build-native-node, smoke-test-native-node]
    if: ${{ github.event_name != 'pull_request' }}
    name: Build Minimal Native Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download amd64 Native Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-linux-amd64
          path: min-context/amd64

      - name: Download arm64 Native Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-linux-arm64
          path: min-context/arm64

      - name: Build Minimal Native Image Archives
        run: |
          chmod +x min-context/amd64/sapl min-context/arm64/sapl
          docker buildx create --use --name sapl-min-builder || docker buildx use sapl-min-builder
          docker buildx build --platform linux/amd64 -f sapl-node/packaging/docker/Dockerfile \
            -t ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min-amd64 \
            --output type=docker,dest=sapl-node-min-amd64.tar min-context/amd64
          docker buildx build --platform linux/arm64 -f sapl-node/packaging/docker/Dockerfile \
            -t ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min-arm64 \
            --output type=docker,dest=sapl-node-min-arm64.tar min-context/arm64

      - name: Upload Minimal Native Image Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: minimal-native-docker-images
          path: |
            sapl-node-min-amd64.tar
            sapl-node-min-arm64.tar
          if-no-files-found: error
          retention-days: 1

  build-native-node-release-assets:
    needs: [version-check, build-native-node, build-docker]
    if: ${{ github.event_name != 'pull_request' }}
    name: Build Native SAPL Node Release Assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            LICENSE
            sapl-node/README.md
            sapl-node/packaging
          sparse-checkout-cone-mode: false

      - name: Download Linux amd64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-linux-amd64
          path: artifacts/linux-amd64

      - name: Download Linux arm64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-linux-arm64
          path: artifacts/linux-arm64

      - name: Download Windows artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-windows-amd64
          path: artifacts/windows

      - name: Download macOS artifact
        if: ${{ needs.version-check.outputs.is_tag == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-macos-arm64
          path: artifacts/macos

      - name: Download SAPL Node JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-node-jars
          path: sapl-node/target

      - name: Prepare release assets
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
          IS_TAG: ${{ needs.version-check.outputs.is_tag }}
        run: |
          mkdir -p release staging/linux-amd64/sbom staging/linux-arm64/sbom staging/windows/sbom

          MAN_SRC=artifacts/linux-amd64/generated-man
          COMPLETION_SRC=artifacts/linux-amd64/generated-completion
          JAR_SBOM_SRC=artifacts/linux-amd64/classes/META-INF/sbom/application.cdx.json
          LINUX_AMD64_SBOM_SRC=artifacts/linux-amd64/classes/META-INF/sbom/application.cdx.json
          LINUX_ARM64_SBOM_SRC=artifacts/linux-arm64/classes/META-INF/sbom/application.cdx.json
          WINDOWS_SBOM_SRC=artifacts/windows/classes/META-INF/sbom/application.cdx.json

          cp artifacts/linux-amd64/sapl staging/linux-amd64/sapl
          chmod +x staging/linux-amd64/sapl
          cp LICENSE staging/linux-amd64/
          cp sapl-node/README.md staging/linux-amd64/
          cp -r "$MAN_SRC" staging/linux-amd64/man
          mkdir -p staging/linux-amd64/completion
          cp "$COMPLETION_SRC/sapl.bash" staging/linux-amd64/completion/
          cp "$LINUX_AMD64_SBOM_SRC" staging/linux-amd64/sbom/application.cdx.json
          tar -czf "release/sapl-${VERSION}-linux-amd64.tar.gz" -C staging/linux-amd64 .

          cp artifacts/linux-arm64/sapl staging/linux-arm64/sapl
          chmod +x staging/linux-arm64/sapl
          cp LICENSE staging/linux-arm64/
          cp sapl-node/README.md staging/linux-arm64/
          cp -r "$MAN_SRC" staging/linux-arm64/man
          mkdir -p staging/linux-arm64/completion
          cp "$COMPLETION_SRC/sapl.bash" staging/linux-arm64/completion/
          cp "$LINUX_ARM64_SBOM_SRC" staging/linux-arm64/sbom/application.cdx.json
          tar -czf "release/sapl-${VERSION}-linux-arm64.tar.gz" -C staging/linux-arm64 .

          if [ "$IS_TAG" = "true" ]; then
            MACOS_SBOM_SRC=artifacts/macos/classes/META-INF/sbom/application.cdx.json
            mkdir -p staging/macos/sbom
            cp artifacts/macos/sapl staging/macos/sapl
            chmod +x staging/macos/sapl
            cp LICENSE staging/macos/
            cp sapl-node/README.md staging/macos/
            cp -r "$MAN_SRC" staging/macos/man
            mkdir -p staging/macos/completion
            cp "$COMPLETION_SRC/sapl.bash" staging/macos/completion/
            cp "$MACOS_SBOM_SRC" staging/macos/sbom/application.cdx.json
            tar -czf "release/sapl-${VERSION}-macos-arm64.tar.gz" -C staging/macos .
            cp "$MACOS_SBOM_SRC" "release/sapl-${VERSION}-macos-arm64.cdx.json"
          fi

          cp artifacts/windows/sapl.exe staging/windows/sapl.exe
          cp LICENSE staging/windows/
          cp sapl-node/README.md staging/windows/
          cp "$WINDOWS_SBOM_SRC" staging/windows/sbom/application.cdx.json
          cd staging/windows && zip -qr "../../release/sapl-${VERSION}-windows-amd64.zip" . && cd ../..

          cp sapl-node/target/sapl-node-*.jar "release/sapl-node-${VERSION}.jar"
          cp "$JAR_SBOM_SRC" "release/sapl-node-${VERSION}.cdx.json"
          cp "$LINUX_AMD64_SBOM_SRC" "release/sapl-${VERSION}-linux-amd64.cdx.json"
          cp "$LINUX_ARM64_SBOM_SRC" "release/sapl-${VERSION}-linux-arm64.cdx.json"
          cp "$WINDOWS_SBOM_SRC" "release/sapl-${VERSION}-windows-amd64.cdx.json"

      - name: Install nfpm
        run: |
          NFPM_VERSION=2.47.0
          NFPM_ARCHIVE="nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          NFPM_SHA256=0660ca602b2d2d2ae4781a06c692b3eeb9d437ffea05b831d76e41f4a3188783
          curl --proto '=https' -fsSLO "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/${NFPM_ARCHIVE}"
          echo "${NFPM_SHA256}  ${NFPM_ARCHIVE}" | sha256sum -c -
          tar xzf "${NFPM_ARCHIVE}" -C "$RUNNER_TEMP" nfpm
          sudo install "$RUNNER_TEMP/nfpm" /usr/local/bin/nfpm

      - name: Build DEB and RPM packages
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          export MAN_DIR=artifacts/linux-amd64/generated-man
          export COMPLETION_DIR=artifacts/linux-amd64/generated-completion
          export BINARY=artifacts/linux-amd64/sapl ARCH=amd64 SBOM=artifacts/linux-amd64/classes/META-INF/sbom/application.cdx.json
          nfpm package --config sapl-node/packaging/nfpm.yml --packager deb --target "release/sapl_${VERSION}_amd64.deb"
          nfpm package --config sapl-node/packaging/nfpm.yml --packager rpm --target "release/sapl-${VERSION}.x86_64.rpm"
          export BINARY=artifacts/linux-arm64/sapl ARCH=arm64 SBOM=artifacts/linux-arm64/classes/META-INF/sbom/application.cdx.json
          nfpm package --config sapl-node/packaging/nfpm.yml --packager deb --target "release/sapl_${VERSION}_arm64.deb"
          nfpm package --config sapl-node/packaging/nfpm.yml --packager rpm --target "release/sapl-${VERSION}.aarch64.rpm"

      - name: Generate checksums
        run: |
          cd release
          sha256sum ./* > SHA256SUMS.txt

      - name: Attest SAPL Node release artifact provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release/*

      - name: Attest SAPL Node JVM SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: release/sapl-node-${{ needs.version-check.outputs.version }}.jar
          sbom-path: release/sapl-node-${{ needs.version-check.outputs.version }}.cdx.json

      - name: Attest SAPL Node linux amd64 SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            release/sapl-${{ needs.version-check.outputs.version }}-linux-amd64.tar.gz
            release/sapl_${{ needs.version-check.outputs.version }}_amd64.deb
            release/sapl-${{ needs.version-check.outputs.version }}.x86_64.rpm
          sbom-path: release/sapl-${{ needs.version-check.outputs.version }}-linux-amd64.cdx.json

      - name: Attest SAPL Node linux arm64 SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            release/sapl-${{ needs.version-check.outputs.version }}-linux-arm64.tar.gz
            release/sapl_${{ needs.version-check.outputs.version }}_arm64.deb
            release/sapl-${{ needs.version-check.outputs.version }}.aarch64.rpm
          sbom-path: release/sapl-${{ needs.version-check.outputs.version }}-linux-arm64.cdx.json

      - name: Attest SAPL Node macOS SBOM
        if: ${{ needs.version-check.outputs.is_tag == 'true' }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: release/sapl-${{ needs.version-check.outputs.version }}-macos-arm64.tar.gz
          sbom-path: release/sapl-${{ needs.version-check.outputs.version }}-macos-arm64.cdx.json

      - name: Attest SAPL Node Windows SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: release/sapl-${{ needs.version-check.outputs.version }}-windows-amd64.zip
          sbom-path: release/sapl-${{ needs.version-check.outputs.version }}-windows-amd64.cdx.json

      - name: Upload SAPL Node release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sapl-node-release-assets
          path: release/*
          if-no-files-found: error
          retention-days: 1

  build-native-lsp-release-assets:
    needs: [version-check, build-native-lsp]
    if: ${{ github.event_name != 'pull_request' }}
    name: Build Native Language Server Release Assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            LICENSE
            sapl-language-server/README.md
            sapl-language-server/packaging
          sparse-checkout-cone-mode: false

      - name: Download Linux amd64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-language-server-linux-amd64
          path: artifacts/linux-amd64

      - name: Download Linux arm64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-language-server-linux-arm64
          path: artifacts/linux-arm64

      - name: Download Windows artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-language-server-windows-amd64
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-language-server-macos-arm64
          path: artifacts/macos

      - name: Prepare release assets
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          mkdir -p release staging/linux-amd64/sbom staging/linux-arm64/sbom staging/macos/sbom staging/windows/sbom
          LINUX_AMD64_SBOM_SRC=artifacts/linux-amd64/classes/META-INF/sbom/bom.json
          LINUX_ARM64_SBOM_SRC=artifacts/linux-arm64/classes/META-INF/sbom/bom.json
          MACOS_SBOM_SRC=artifacts/macos/classes/META-INF/sbom/bom.json
          WINDOWS_SBOM_SRC=artifacts/windows/classes/META-INF/sbom/bom.json

          cp artifacts/linux-amd64/sapl-language-server staging/linux-amd64/sapl-language-server
          chmod +x staging/linux-amd64/sapl-language-server
          cp LICENSE staging/linux-amd64/
          cp sapl-language-server/README.md staging/linux-amd64/
          cp sapl-language-server/packaging/sapl-language-server.1 staging/linux-amd64/
          cp "$LINUX_AMD64_SBOM_SRC" staging/linux-amd64/sbom/application.cdx.json
          tar -czf "release/sapl-language-server-${VERSION}-linux-amd64.tar.gz" -C staging/linux-amd64 .

          cp artifacts/linux-arm64/sapl-language-server staging/linux-arm64/sapl-language-server
          chmod +x staging/linux-arm64/sapl-language-server
          cp LICENSE staging/linux-arm64/
          cp sapl-language-server/README.md staging/linux-arm64/
          cp sapl-language-server/packaging/sapl-language-server.1 staging/linux-arm64/
          cp "$LINUX_ARM64_SBOM_SRC" staging/linux-arm64/sbom/application.cdx.json
          tar -czf "release/sapl-language-server-${VERSION}-linux-arm64.tar.gz" -C staging/linux-arm64 .

          cp artifacts/macos/sapl-language-server staging/macos/sapl-language-server
          chmod +x staging/macos/sapl-language-server
          cp LICENSE staging/macos/
          cp sapl-language-server/README.md staging/macos/
          cp sapl-language-server/packaging/sapl-language-server.1 staging/macos/
          cp "$MACOS_SBOM_SRC" staging/macos/sbom/application.cdx.json
          tar -czf "release/sapl-language-server-${VERSION}-macos-arm64.tar.gz" -C staging/macos .

          cp artifacts/windows/sapl-language-server.exe staging/windows/sapl-language-server.exe
          cp LICENSE staging/windows/
          cp sapl-language-server/README.md staging/windows/
          cp "$WINDOWS_SBOM_SRC" staging/windows/sbom/application.cdx.json
          cd staging/windows && zip -qr "../../release/sapl-language-server-${VERSION}-windows-amd64.zip" . && cd ../..
          cp "$LINUX_AMD64_SBOM_SRC" "release/sapl-language-server-${VERSION}-linux-amd64.cdx.json"
          cp "$LINUX_ARM64_SBOM_SRC" "release/sapl-language-server-${VERSION}-linux-arm64.cdx.json"
          cp "$MACOS_SBOM_SRC" "release/sapl-language-server-${VERSION}-macos-arm64.cdx.json"
          cp "$WINDOWS_SBOM_SRC" "release/sapl-language-server-${VERSION}-windows-amd64.cdx.json"

      - name: Install nfpm
        run: |
          NFPM_VERSION=2.47.0
          NFPM_ARCHIVE="nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          NFPM_SHA256=0660ca602b2d2d2ae4781a06c692b3eeb9d437ffea05b831d76e41f4a3188783
          curl --proto '=https' -fsSLO "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/${NFPM_ARCHIVE}"
          echo "${NFPM_SHA256}  ${NFPM_ARCHIVE}" | sha256sum -c -
          tar xzf "${NFPM_ARCHIVE}" -C "$RUNNER_TEMP" nfpm
          sudo install "$RUNNER_TEMP/nfpm" /usr/local/bin/nfpm

      - name: Build DEB and RPM packages
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          export BINARY=artifacts/linux-amd64/sapl-language-server ARCH=amd64 SBOM=artifacts/linux-amd64/classes/META-INF/sbom/bom.json
          nfpm package --config sapl-language-server/packaging/nfpm.yml --packager deb --target "release/sapl-language-server_${VERSION}_amd64.deb"
          nfpm package --config sapl-language-server/packaging/nfpm.yml --packager rpm --target "release/sapl-language-server-${VERSION}.x86_64.rpm"
          export BINARY=artifacts/linux-arm64/sapl-language-server ARCH=arm64 SBOM=artifacts/linux-arm64/classes/META-INF/sbom/bom.json
          nfpm package --config sapl-language-server/packaging/nfpm.yml --packager deb --target "release/sapl-language-server_${VERSION}_arm64.deb"
          nfpm package --config sapl-language-server/packaging/nfpm.yml --packager rpm --target "release/sapl-language-server-${VERSION}.aarch64.rpm"

      - name: Generate checksums
        run: |
          cd release
          sha256sum ./* > SHA256SUMS.txt

      - name: Attest SAPL Language Server release artifact provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release/*

      - name: Attest SAPL Language Server linux amd64 SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            release/sapl-language-server-${{ needs.version-check.outputs.version }}-linux-amd64.tar.gz
            release/sapl-language-server_${{ needs.version-check.outputs.version }}_amd64.deb
            release/sapl-language-server-${{ needs.version-check.outputs.version }}.x86_64.rpm
          sbom-path: release/sapl-language-server-${{ needs.version-check.outputs.version }}-linux-amd64.cdx.json

      - name: Attest SAPL Language Server linux arm64 SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            release/sapl-language-server-${{ needs.version-check.outputs.version }}-linux-arm64.tar.gz
            release/sapl-language-server_${{ needs.version-check.outputs.version }}_arm64.deb
            release/sapl-language-server-${{ needs.version-check.outputs.version }}.aarch64.rpm
          sbom-path: release/sapl-language-server-${{ needs.version-check.outputs.version }}-linux-arm64.cdx.json

      - name: Attest SAPL Language Server macOS SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: release/sapl-language-server-${{ needs.version-check.outputs.version }}-macos-arm64.tar.gz
          sbom-path: release/sapl-language-server-${{ needs.version-check.outputs.version }}-macos-arm64.cdx.json

      - name: Attest SAPL Language Server Windows SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: release/sapl-language-server-${{ needs.version-check.outputs.version }}-windows-amd64.zip
          sbom-path: release/sapl-language-server-${{ needs.version-check.outputs.version }}-windows-amd64.cdx.json

      - name: Upload SAPL Language Server release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sapl-language-server-release-assets
          path: release/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Phase 2: Publish (gated on all of Phase 1)
  # ---------------------------------------------------------------------------

  publish-maven:
    needs: [test, version-check, build-native-node, build-native-lsp, build-docker, build-min-docker, build-native-node-release-assets, build-native-lsp-release-assets, smoke-test-native-node, benchmark-scripts-test]
    if: >-
      ${{
        !failure() && !cancelled() &&
        (
          (github.ref == 'refs/heads/master' && needs.version-check.outputs.is_snapshot == 'true')
          || needs.version-check.outputs.is_tag == 'true'
        )
      }}
    name: Publish Maven Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    timeout-minutes: 60

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
          server-id: central
          server-username: NEXUS_USERNAME
          server-password: NEXUS_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure Servers
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          githubServer: false
          servers: |
            [{
              "id": "central",
              "username": "${{ secrets.NEXUS_USERNAME }}",
              "password": "${{ secrets.NEXUS_PASSWORD }}"
            }, {
              "id": "github",
              "username": "${{ secrets.GHUB_USERNAME }}",
              "password": "${{ secrets.GHUB_ACCESS_TOKEN }}"
            }]

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy Maven Artifacts
        run: mvn -B --no-transfer-progress -pl !:sapl-node,!:sapl-playground,!:sapl-documentation-generator -PsonatypeDeploy -Dmaven.test.skip=true clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.NEXUS_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Attest Maven artifact provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            pom.xml
            **/pom.xml
            **/target/*.jar
            **/target/**/*.spdx.json

      - name: Clean up Local Repository before Caching
        run: rm -rf ~/.m2/repository/io/sapl

  publish-docker:
    needs: [test, version-check, build-native-node, build-native-lsp, build-docker, build-min-docker, build-native-node-release-assets, build-native-lsp-release-assets, smoke-test-native-node, benchmark-scripts-test]
    if: >-
      ${{
        !failure() && !cancelled() &&
        (
          (github.ref == 'refs/heads/master' && needs.version-check.outputs.is_snapshot == 'true')
          || needs.version-check.outputs.is_tag == 'true'
        )
      }}
    name: Publish Docker Images
    runs-on: ubuntu-latest
    outputs:
      sapl-node-hashes: ${{ steps.get-server-lt-hash.outputs.hashes }}
      sapl-node-docker-digest: ${{ steps.get-server-lt-hash.outputs.IMAGE_DIGEST }}
      sapl-playground-docker-digest: ${{ steps.get-playground-hash.outputs.IMAGE_DIGEST }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    timeout-minutes: 30

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download Docker Image Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-images

      - name: Download SAPL Node JAR Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-node-jars
          path: sapl-node/target

      - name: Load SAPL Node Image
        run: docker load < sapl-node-docker-image.tar.gz

      - name: Load SAPL Playground Image
        run: docker load < sapl-playground-docker-image.tar.gz

      - name: Log in to the Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHUB_ACCESS_TOKEN }}

      - name: Push SAPL Node Image to ghcr.io
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: docker push ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}

      - name: Push Playground Image to ghcr.io
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: docker push ghcr.io/heutelbeck/sapl-playground:${{ needs.version-check.outputs.version }}

      - name: Get hashes of SAPL Node
        id: get-server-lt-hash
        env:
          REGISTRY: ghcr.io
          IMAGE: heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}
        run: |
          # Save the location of the maven output files for easier reference
          ARTIFACT_PATTERN=(sapl-node/target/sapl-node-*.jar)

          echo "hashes=$(sha256sum "${ARTIFACT_PATTERN[@]}" | base64 -w0)" >> "$GITHUB_OUTPUT"

          # Save the digest of the Docker image for later use
          IMAGE_DIGEST=$(docker inspect "${REGISTRY}/${IMAGE}" --format '{{index .RepoDigests 0}}' | cut -d'@' -f2)
          echo "Digest of container: $IMAGE_DIGEST"
          echo "IMAGE_DIGEST=$IMAGE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Get hash of Playground
        id: get-playground-hash
        env:
          REGISTRY: ghcr.io
          IMAGE: heutelbeck/sapl-playground:${{ needs.version-check.outputs.version }}
        run: |
          # Save the digest of the Docker image for later use
          IMAGE_DIGEST=$(docker inspect "${REGISTRY}/${IMAGE}" --format '{{index .RepoDigests 0}}' | cut -d'@' -f2)
          echo "Digest of container: $IMAGE_DIGEST"
          echo "IMAGE_DIGEST=$IMAGE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Generate SAPL Node image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/heutelbeck/sapl-node@${{ steps.get-server-lt-hash.outputs.IMAGE_DIGEST }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GHUB_ACCESS_TOKEN }}
          format: spdx-json
          output-file: sapl-node-image.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate Playground image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/heutelbeck/sapl-playground@${{ steps.get-playground-hash.outputs.IMAGE_DIGEST }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GHUB_ACCESS_TOKEN }}
          format: spdx-json
          output-file: sapl-playground-image.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Sign JVM Docker images
        run: |
          cosign sign --yes ghcr.io/heutelbeck/sapl-node@${{ steps.get-server-lt-hash.outputs.IMAGE_DIGEST }}
          cosign sign --yes ghcr.io/heutelbeck/sapl-playground@${{ steps.get-playground-hash.outputs.IMAGE_DIGEST }}

      - name: Attest SAPL Node image provenance
