  publish-min-docker:
    needs: [test, version-check, build-native-node, build-native-lsp, build-docker, build-min-docker, build-native-node-release-assets, build-native-lsp-release-assets, smoke-test-native-node, benchmark-scripts-test]
    if: >-
      ${{
        !failure() && !cancelled() &&
        (
          (github.ref == 'refs/heads/master' && needs.version-check.outputs.is_snapshot == 'true')
          || needs.version-check.outputs.is_tag == 'true'
        )
      }}
    name: Publish Minimal Native Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    timeout-minutes: 20

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download Minimal Native Image Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: minimal-native-docker-images

      - name: Log in to the Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHUB_ACCESS_TOKEN }}

      - name: Load Minimal Native Image Archives
        run: |
          docker load --input sapl-node-min-amd64.tar
          docker load --input sapl-node-min-arm64.tar

      - name: Push Minimal Native amd64 Image
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: docker push ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min-amd64

      - name: Push Minimal Native arm64 Image
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: docker push ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min-arm64

      - name: Capture Minimal Native Image Digests
        id: min-digests
        env:
          IMAGE: ghcr.io/heutelbeck/sapl-node
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          AMD64_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}-min-amd64" | awk '/^Digest:/ {print $2; exit}')
          ARM64_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}-min-arm64" | awk '/^Digest:/ {print $2; exit}')
          echo "amd64_digest=${AMD64_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "arm64_digest=${ARM64_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "amd64_digest=${AMD64_DIGEST}"
          echo "arm64_digest=${ARM64_DIGEST}"

      - name: Publish Minimal Native Manifest
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: >-
            docker buildx imagetools create
            -t ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min
            ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min-amd64@${{ steps.min-digests.outputs.amd64_digest }}
            ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min-arm64@${{ steps.min-digests.outputs.arm64_digest }}

      - name: Capture Minimal Native Manifest Digest
        id: min-manifest-digest
        env:
          IMAGE: ghcr.io/heutelbeck/sapl-node
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          MANIFEST_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}-min" | awk '/^Digest:/ {print $2; exit}')
          echo "manifest_digest=${MANIFEST_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "manifest_digest=${MANIFEST_DIGEST}"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Generate Minimal Native amd64 image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/heutelbeck/sapl-node@${{ steps.min-digests.outputs.amd64_digest }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GHUB_ACCESS_TOKEN }}
          format: spdx-json
          output-file: sapl-node-min-amd64-image.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate Minimal Native arm64 image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/heutelbeck/sapl-node@${{ steps.min-digests.outputs.arm64_digest }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GHUB_ACCESS_TOKEN }}
          format: spdx-json
          output-file: sapl-node-min-arm64-image.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Sign Minimal Native Docker images
        run: |
          cosign sign --yes ghcr.io/heutelbeck/sapl-node@${{ steps.min-digests.outputs.amd64_digest }}
          cosign sign --yes ghcr.io/heutelbeck/sapl-node@${{ steps.min-digests.outputs.arm64_digest }}
          cosign sign --yes ghcr.io/heutelbeck/sapl-node@${{ steps.min-manifest-digest.outputs.manifest_digest }}

      - name: Attest Minimal Native amd64 image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/heutelbeck/sapl-node
          subject-digest: ${{ steps.min-digests.outputs.amd64_digest }}
          push-to-registry: true

      - name: Attest Minimal Native amd64 image SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/heutelbeck/sapl-node
          subject-digest: ${{ steps.min-digests.outputs.amd64_digest }}
          sbom-path: sapl-node-min-amd64-image.spdx.json
          push-to-registry: true

      - name: Attest Minimal Native arm64 image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/heutelbeck/sapl-node
          subject-digest: ${{ steps.min-digests.outputs.arm64_digest }}
          push-to-registry: true

      - name: Attest Minimal Native arm64 image SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/heutelbeck/sapl-node
          subject-digest: ${{ steps.min-digests.outputs.arm64_digest }}
          sbom-path: sapl-node-min-arm64-image.spdx.json
          push-to-registry: true

      - name: Attest Minimal Native manifest provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/heutelbeck/sapl-node
          subject-digest: ${{ steps.min-manifest-digest.outputs.manifest_digest }}
          push-to-registry: true

  publish-native-node:
    needs: [test, version-check, build-native-node, build-native-lsp, build-docker, build-min-docker, build-native-node-release-assets, build-native-lsp-release-assets, smoke-test-native-node, benchmark-scripts-test]
    if: >-
      ${{
        !failure() && !cancelled() &&
        (
          (github.ref == 'refs/heads/master' && needs.version-check.outputs.is_snapshot == 'true')
          || needs.version-check.outputs.is_tag == 'true'
        )
      }}
    name: Publish Native SAPL Node
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download SAPL Node release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sapl-node-release-assets
          path: release

      - name: Update snapshot release
        if: ${{ needs.version-check.outputs.is_snapshot == 'true' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: snapshot-node
          name: Latest SAPL Node Snapshot
          prerelease: true
          body: |
            ## Latest SAPL Node Development Snapshot

            This is an automatically updated pre-release containing the latest native builds from the `master` branch.

            **Warning:** This is a development snapshot and may be unstable.

            ### Downloads
            | Platform | Archive |
            |----------|---------|
            | JVM (all platforms) | `sapl-node-${{ needs.version-check.outputs.version }}.jar` |
            | Linux x86_64 | `sapl-${{ needs.version-check.outputs.version }}-linux-amd64.tar.gz` |
            | Linux ARM64 | `sapl-${{ needs.version-check.outputs.version }}-linux-arm64.tar.gz` |
            | Windows x86_64 | `sapl-${{ needs.version-check.outputs.version }}-windows-amd64.zip` |

            Each native archive contains the `sapl` binary, `LICENSE`, and `README.md`.
            The JVM JAR is a Spring Boot fat JAR that runs on any platform with Java 21+.
            macOS native archives are built for version tags only.

            ### Linux Packages
            | Format | x86_64 | ARM64 |
            |--------|--------|-------|
            | DEB | `sapl_${{ needs.version-check.outputs.version }}_amd64.deb` | `sapl_${{ needs.version-check.outputs.version }}_arm64.deb` |
            | RPM | `sapl-${{ needs.version-check.outputs.version }}.x86_64.rpm` | `sapl-${{ needs.version-check.outputs.version }}.aarch64.rpm` |

            Install with `sudo dpkg -i sapl_*.deb` or `sudo rpm -i sapl-*.rpm`. The package installs a systemd service, a default configuration at `/etc/sapl/application.yml`, and a `sapl` system user.

            ### Verification
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ### Usage
            ```bash
            tar xzf sapl-*-linux-amd64.tar.gz
            ./sapl --version
            ```

            ### Docker Images
            Pull `ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}` for the JVM image. Use it for sustained throughput, low tail latency, and runtime extension jars.

            Pull `ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min` for the minimal native image. It is a multi architecture image for amd64 and arm64. It is smaller, boots faster, and has less attack surface. Its tradeoff is a lower performance ceiling under sustained load.

            Use `ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min-amd64` or `ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min-arm64` when the deployment platform must be pinned.

            Built from commit: ${{ github.sha }}
          files: release/*
          fail_on_unmatched_files: true

      - name: Move snapshot-node tag to current commit
        if: ${{ needs.version-check.outputs.is_snapshot == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PATCH "repos/${{ github.repository }}/git/refs/tags/snapshot-node" \
            -f sha="${{ github.sha }}" -F force=true

      - name: Create release
        if: ${{ needs.version-check.outputs.is_tag == 'true' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: SAPL Node ${{ github.ref_name }}
          body: |
            ## SAPL Node ${{ github.ref_name }}

            SAPL PDP Node server and CLI.

            ### Downloads
            | Platform | Archive |
            |----------|---------|
            | JVM (all platforms) | `sapl-node-${{ needs.version-check.outputs.version }}.jar` |
            | Linux x86_64 | `sapl-${{ needs.version-check.outputs.version }}-linux-amd64.tar.gz` |
            | Linux ARM64 | `sapl-${{ needs.version-check.outputs.version }}-linux-arm64.tar.gz` |
            | macOS ARM64 | `sapl-${{ needs.version-check.outputs.version }}-macos-arm64.tar.gz` |
            | Windows x86_64 | `sapl-${{ needs.version-check.outputs.version }}-windows-amd64.zip` |

            The JVM JAR is a Spring Boot fat JAR that runs on any platform with Java 21+.
            Each native archive contains the `sapl` binary, `LICENSE`, and `README.md`.

            ### macOS users: first-run setup

            macOS Gatekeeper blocks unsigned binaries downloaded from the internet. After extracting the tarball, run this once to allow the binary to execute:

            ```bash
            xattr -dr com.apple.quarantine ./sapl
            ```

            Alternatively, right-click `sapl` in Finder, choose **Open**, and confirm in the dialog. After approval, you can run it normally from the command line.

            ### Linux Packages
            | Format | x86_64 | ARM64 |
            |--------|--------|-------|
            | DEB | `sapl_${{ needs.version-check.outputs.version }}_amd64.deb` | `sapl_${{ needs.version-check.outputs.version }}_arm64.deb` |
            | RPM | `sapl-${{ needs.version-check.outputs.version }}.x86_64.rpm` | `sapl-${{ needs.version-check.outputs.version }}.aarch64.rpm` |

            Install with `sudo dpkg -i sapl_*.deb` or `sudo rpm -i sapl-*.rpm`. The package installs a systemd service, a default configuration at `/etc/sapl/application.yml`, and a `sapl` system user.

            ### Verification
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ### Usage
            ```bash
            # Linux / macOS
            tar xzf sapl-*-linux-amd64.tar.gz
            ./sapl --version

            # Windows (extract zip, then)
            sapl.exe --version
            ```

            ### Docker Images
            Pull `ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}` for the JVM image. Use it for sustained throughput, low tail latency, and runtime extension jars.

            Pull `ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min` for the minimal native image. It is a multi architecture image for amd64 and arm64. It is smaller, boots faster, and has less attack surface. Its tradeoff is a lower performance ceiling under sustained load.

            Use `ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min-amd64` or `ghcr.io/heutelbeck/sapl-node:${{ needs.version-check.outputs.version }}-min-arm64` when the deployment platform must be pinned.
          files: release/*
          fail_on_unmatched_files: true

      - name: Update Nix package hashes
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
          GH_TOKEN: ${{ secrets.GHUB_ACCESS_TOKEN }}
        run: |
          AMD64_HASH="sha256-$(openssl dgst -sha256 -binary "release/sapl-${VERSION}-linux-amd64.tar.gz" | base64 -w0)"
          ARM64_HASH="sha256-$(openssl dgst -sha256 -binary "release/sapl-${VERSION}-linux-arm64.tar.gz" | base64 -w0)"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/heutelbeck/sapl-nix.git" sapl-nix
          printf '{\n  "linux-amd64": "%s",\n  "linux-arm64": "%s"\n}\n' "$AMD64_HASH" "$ARM64_HASH" > sapl-nix/nix/hashes.json
          cd sapl-nix
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/hashes.json
          if git diff --cached --quiet; then echo "No hash changes"; exit 0; fi
          git commit -m "update sapl-node package hashes for ${VERSION}"
          git push

