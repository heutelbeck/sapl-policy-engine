    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download all current release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p sums-staging
          gh release download "${TAG}" --repo "${{ github.repository }}" --dir sums-staging --pattern '*.tar.gz' --pattern '*.zip' --pattern '*.deb' --pattern '*.rpm' --pattern '*.jar' --pattern '*.cdx.json'
          ls -lh sums-staging/

      - name: Generate complete SHA256SUMS.txt
        run: |
          cd sums-staging
          sha256sum -- * > SHA256SUMS.txt
          echo "=== Final SHA256SUMS.txt ($(wc -l < SHA256SUMS.txt) entries) ==="
          cat SHA256SUMS.txt

      - name: Attest final release checksums
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: sums-staging/SHA256SUMS.txt

      - name: Upload SHA256SUMS.txt to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "${TAG}" sums-staging/SHA256SUMS.txt --clobber --repo "${{ github.repository }}"

  publish-docs:
    needs: [test, version-check]
    if: >-
      ${{
        !failure() && !cancelled() &&
        (
          (github.ref == 'refs/heads/master' && needs.version-check.outputs.is_snapshot == 'true')
          || needs.version-check.outputs.is_tag == 'true'
        )
      }}
    name: Publish Documentation
    permissions:
      contents: read
    uses: ./.github/workflows/build_documentation.yml
    secrets:
      GHUB_ACCESS_TOKEN: ${{ secrets.GHUB_ACCESS_TOKEN }}

  deploy-playground:
    needs: [publish-docker, version-check]
    if: >-
      ${{
        !failure() && !cancelled() &&
        needs.version-check.outputs.is_tag == 'true'
      }}
    name: Deploy Playground
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Deploy Playground to Server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.PLAYGROUND_SERVER_HOST }}
          username: ${{ secrets.PLAYGROUND_SERVER_USERNAME }}
          key: ${{ secrets.PLAYGROUND_SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/heutelbeck/sapl-playground@${{ needs.publish-docker.outputs.sapl-playground-docker-digest }}
            docker stop sapl-playground || true
            docker rm sapl-playground || true
            docker run -d \
              --name sapl-playground \
              --restart unless-stopped \
              -p 9003:8080 \
              -e SAPL_PLAYGROUND_BASEURL=https://playground.sapl.io \
              -e SAPL_EMBED_CORS_ALLOWEDORIGINS_0=https://sapl.io \
              ghcr.io/heutelbeck/sapl-playground@${{ needs.publish-docker.outputs.sapl-playground-docker-digest }}

            echo "Verifying deployment..."
            sleep 10

            # Verify container is running
            if ! docker ps | grep -q sapl-playground; then
              echo "ERROR: Container not running"
              docker logs sapl-playground --tail 50
              exit 1
            fi
            echo "[OK] Container is running"

            # Verify users can access the playground
            echo "Checking public availability at https://playground.sapl.io ..."
            for i in {1..6}; do
              if curl -f -s -m 10 https://playground.sapl.io > /dev/null 2>&1; then
                echo "[OK] Playground is publicly accessible"
                exit 0
              fi
              echo "Attempt $i/6: Not ready yet, waiting 10s..."
              sleep 10
            done

            echo "ERROR: Playground not publicly accessible after 60 seconds"
            docker logs sapl-playground --tail 50
            exit 1

  trigger-downstream:
    needs: [publish-maven]
    if: ${{ github.ref == 'refs/heads/master' }}
    name: Trigger Downstream Builds
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Trigger CI Build of sapl-demos
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          GHUB_USERNAME: ${{ secrets.GHUB_USERNAME }}
          GHUB_ACCESS_TOKEN: ${{ secrets.GHUB_ACCESS_TOKEN }}
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_on: error
          command: |
            curl -XPOST -u "$GHUB_USERNAME:$GHUB_ACCESS_TOKEN" -H "Accept: application/vnd.github.everest-preview+json" -H "Content-Type: application/json" https://api.github.com/repos/heutelbeck/sapl-demos/dispatches --data '{"event_type": "build_application"}'

      - name: Trigger CI Build of sapl-extensions
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          GHUB_USERNAME: ${{ secrets.GHUB_USERNAME }}
          GHUB_ACCESS_TOKEN: ${{ secrets.GHUB_ACCESS_TOKEN }}
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_on: error
          command: |
            curl -XPOST -u "$GHUB_USERNAME:$GHUB_ACCESS_TOKEN" -H "Accept: application/vnd.github.everest-preview+json" -H "Content-Type: application/json" https://api.github.com/repos/heutelbeck/sapl-extensions/dispatches --data '{"event_type": "build_application"}'
