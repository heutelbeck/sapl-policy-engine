name: Push documentation to sapl.io

on:
  workflow_call:
    secrets:
      GHUB_ACCESS_TOKEN:
        required: true
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'sapl-documentation/**'

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 25
          distribution: temurin
          cache: 'maven'

      - name: Get version
        id: get-version
        run: |
          VERSION=$( mvn help:evaluate -Dexpression=project.version -q -DforceStdout )
          #echo "::set-output name=version::$VERSION" 
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Required Modules Only
        run: mvn -B clean install -pl sapl-documentation-generator,sapl-node,sapl-bom -am -DskipTests -T 1C

      - name: Run Documentation Generator
        run: |
          pushd sapl-documentation-generator
          mvn spring-boot:run -o
          popd

      - name: Combine Documentation Directories
        run: |
          mkdir -p combined-documentation
          cp -r sapl-documentation/* combined-documentation/
          cp -r sapl-documentation-generator/target/doc/* combined-documentation/
          cp sapl-node/target/generated-docs/7_9_CommandLine.md combined-documentation/

      - name: Push Documentation to Website
        # Snapshot versions publish on every run. Release versions publish only
        # from a release tag, never from an untagged push of a release version.
        # Manual dispatch always publishes. ref_type is used instead of
        # event_name because a reusable workflow_call reports the caller's event.
        if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || endsWith(steps.get-version.outputs.version, '-SNAPSHOT')
        uses: hpcodecraft/action-deploy-workspace-to-repo@1aa539ca78d3063db25aeb60124c034f6ba9a611 # v2.2
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GHUB_ACCESS_TOKEN }}
          SRC_FOLDER: combined-documentation
          DEST_OWNER: heutelbeck
          DEST_REPO: sapl-pages
          DEST_BRANCH: master
          DEST_FOLDER: documentation-md/${{ steps.get-version.outputs.version }}
          DEST_PREDEPLOY_CLEANUP: "rm -rf documentation-md/${{ steps.get-version.outputs.version }}/*"