# Release-mechanics lab. Manual only (workflow_dispatch): it never fires on push
# or pull_request. Use it to exercise the SOTA release building blocks in isolation
# and fast, before folding the proven steps into a tag-triggered release workflow.
#
# Run one target at a time from the Actions tab or:
#   gh workflow run lab.yml -f target=sign-keyless
#
# Scope notes:
#   - sign-keyless / sign-gpg-throwaway use NO real secrets (throwaway key / OIDC).
#   - sonar-auth / ghcr-login only validate auth, no publish, no analysis submitted.
#   - Third-party actions here are intentionally light; SHA-pin everything before any
#     of these steps move into the real release workflow.
name: Release Mechanics Lab (manual)

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which mechanic to exercise
        type: choice
        default: sign-keyless
        options:
          - sign-keyless
          - sign-gpg-throwaway
          - sonar-auth
          - ghcr-login
          - all

permissions:
  contents: read

jobs:

  # Keyless artifact signing with Sigstore/cosign. Proves the OIDC identity flow and
  # verification end to end against public Fulcio/Rekor, on a dummy blob, no key,
  # no project build. This is the candidate that replaces the long-lived GPG key.
  sign-keyless:
    if: ${{ inputs.target == 'sign-keyless' || inputs.target == 'all' }}
    name: Keyless signing (cosign)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 10
    env:
      COSIGN_VERSION: v2.4.1
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Install cosign
        run: |
          curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" -o cosign
          chmod +x cosign
          ./cosign version

      - name: Create a dummy artifact
        run: echo "sapl lab artifact $(date -u +%s)" > lab-artifact.txt

      - name: Sign (keyless, OIDC)
        run: |
          ./cosign sign-blob --yes lab-artifact.txt \
            --output-signature lab-artifact.sig \
            --output-certificate lab-artifact.pem

      - name: Verify
        run: |
          ./cosign verify-blob lab-artifact.txt \
            --signature lab-artifact.sig \
            --certificate lab-artifact.pem \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY_OWNER}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          echo "Keyless sign + verify OK."

  # GPG signing with a THROWAWAY key generated in-job, exercising the maven-gpg-plugin
  # path the real -Psign profile uses, on a tiny standalone project. Proves branch
  # builds can validate signing without ever touching the real GPG_PRIVATE_KEY.
  sign-gpg-throwaway:
    if: ${{ inputs.target == 'sign-gpg-throwaway' || inputs.target == 'all' }}
    name: GPG signing (throwaway key)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21

      - name: Generate throwaway GPG key
        run: |
          cat > key.conf <<'EOF'
          %no-protection
          Key-Type: RSA
          Key-Length: 3072
          Name-Real: SAPL Lab Throwaway
          Name-Email: lab@sapl.invalid
          Expire-Date: 1
          %commit
          EOF
          gpg --batch --gen-key key.conf
          gpg --list-secret-keys

      - name: Create a tiny project that signs its artifacts
        run: |
          mkdir -p lab-sign/src/main/java/lab
          echo 'package lab; public class App { public static void main(String[] a) {} }' > lab-sign/src/main/java/lab/App.java
          cat > lab-sign/pom.xml <<'EOF'
          <project xmlns="http://maven.apache.org/POM/4.0.0">
            <modelVersion>4.0.0</modelVersion>
            <groupId>io.sapl.lab</groupId>
            <artifactId>lab-sign</artifactId>
            <version>0.0.1</version>
            <packaging>jar</packaging>
            <properties><maven.compiler.release>21</maven.compiler.release></properties>
            <build><plugins>
              <plugin>
                <groupId>org.apache.maven.plugins</groupId>
                <artifactId>maven-gpg-plugin</artifactId>
                <version>3.2.7</version>
                <executions><execution>
                  <id>sign</id><phase>verify</phase><goals><goal>sign</goal></goals>
                </execution></executions>
                <configuration>
                  <gpgArguments><arg>--pinentry-mode</arg><arg>loopback</arg></gpgArguments>
                </configuration>
              </plugin>
            </plugins></build>
          </project>
          EOF

      - name: Build + sign (skip tests)
        working-directory: lab-sign
        run: mvn -B -ntp -DskipTests verify

      - name: Assert signatures exist and verify
        working-directory: lab-sign
        run: |
          ls -1 target/*.asc
          for f in target/*.asc; do gpg --verify "$f" "${f%.asc}"; done
          echo "Throwaway-key GPG signing OK."

  # Validates the SonarCloud token path and lets you tune the harden-runner egress
  # allowlist (block mode). Read-only: it only calls the auth-validate endpoint, it
  # does not submit an analysis, so it has no side effect on the project.
  sonar-auth:
    if: ${{ inputs.target == 'sonar-auth' || inputs.target == 'all' }}
    name: Sonar token auth + egress block
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Harden Runner (block, tune allowlist here)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            sonarcloud.io:443
            api.sonarcloud.io:443
            scanner.sonarcloud.io:443

      - name: Validate token (no analysis submitted)
        env:
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then echo "SONARCLOUD_TOKEN not available in this context"; exit 1; fi
          body=$(curl -sS -u "${SONAR_TOKEN}:" https://sonarcloud.io/api/authentication/validate)
          echo "response: ${body}"
          echo "${body}" | grep -q '"valid":true'
          echo "Sonar token valid and reachable through the egress allowlist."

  # Proves publish auth to GHCR using the ephemeral GITHUB_TOKEN instead of a personal
  # PAT. Login only, no image is pushed. This is the replacement for GHUB_ACCESS_TOKEN
  # in any job adjacent to untrusted code.
  ghcr-login:
    if: ${{ inputs.target == 'ghcr-login' || inputs.target == 'all' }}
    name: GHCR login (ephemeral token)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Login to GHCR with the ephemeral token
        run: |
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "GHCR login with GITHUB_TOKEN OK (no PAT, no push)."
          docker logout ghcr.io
