name: Build Native SAPL Node

on:
  workflow_call:
    inputs:
      build_macos:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: sapl-linux-amd64
            executable: sapl
            profile: native-linux
            upload-path: |
              sapl-node/target/sapl
              sapl-node/target/generated-man/*.1
              sapl-node/target/generated-completion/sapl.bash
              sapl-node/target/classes/META-INF/sbom/application.cdx.json
          - os: ubuntu-24.04-arm
            artifact-name: sapl-linux-arm64
            executable: sapl
            profile: native-linux-arm
            upload-path: |
              sapl-node/target/sapl
              sapl-node/target/classes/META-INF/sbom/application.cdx.json
          - os: windows-latest
            artifact-name: sapl-windows-amd64
            executable: sapl.exe
            profile: native
            upload-path: |
              sapl-node/target/sapl.exe
              sapl-node/target/classes/META-INF/sbom/application.cdx.json
      fail-fast: false

    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    steps:
      - name: Harden Runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Native Build Tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential musl-dev musl-tools
          # GraalVM hardcodes x86_64-linux-musl-gcc in HostedMuslLibC regardless of arch
          sudo ln -sf /usr/bin/musl-gcc /usr/local/bin/x86_64-linux-musl-gcc
          # Get musl-compiled static zlib from Alpine's package manager
          docker run --rm -v /tmp/alpine-zlib:/out alpine:3.24.1@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b sh -c 'apk add --no-cache zlib-static && cp /usr/lib/libz.a /out/'
          sudo cp /tmp/alpine-zlib/libz.a "/usr/lib/$(uname -m)-linux-musl/"

      - name: Setup Visual Studio Build Tools (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@186d0493a2df5eb62df5ecc498883d18fd58c303 # v1.6.2
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Cache Maven packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-native-node-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-native-node-
            ${{ runner.os }}-maven-native-
            ${{ runner.os }}-maven-

      - name: Build Dependencies
        shell: bash
        run: mvn -B install -pl sapl-node -P${{ matrix.profile }} -am -DskipTests

      - name: Build Native Image
        shell: bash
        run: mvn -B package -pl sapl-node -P${{ matrix.profile }} -am -DskipTests

      - name: Upload Native Executable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.upload-path }}
          if-no-files-found: error
          retention-days: 7

      - name: Clean up Local Repository before Caching
        shell: bash
        run: rm -rf ~/.m2/repository/io/sapl

  build-native-macos:
    name: Build (macos-14-xlarge)
    if: ${{ inputs.build_macos }}
    runs-on: macos-14-xlarge
    timeout-minutes: 120

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@186d0493a2df5eb62df5ecc498883d18fd58c303 # v1.6.2
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Cache Maven packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-native-node-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-native-node-
            ${{ runner.os }}-maven-native-
            ${{ runner.os }}-maven-

      - name: Build Dependencies
        shell: bash
        run: mvn -B install -pl sapl-node -am -DskipTests

      - name: Build Native Image
        shell: bash
        run: mvn -B package -pl sapl-node -Pnative -DskipTests

      - name: Upload Native Executable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sapl-macos-arm64
          path: |
            sapl-node/target/sapl
            sapl-node/target/classes/META-INF/sbom/application.cdx.json
          if-no-files-found: error
          retention-days: 7

      - name: Clean up Local Repository before Caching
        shell: bash
        run: rm -rf ~/.m2/repository/io/sapl
