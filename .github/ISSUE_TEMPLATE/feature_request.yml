name: "🚀 Feature Request"
description: "Suggest an idea or possible new feature for this project."
labels: ["feature"]

body:
  - type: markdown
    attributes:
      value: Search open and closed issues before submitting a feature request.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem or use case this feature should solve.
    validations:
      required: true

  - type: textarea
    id: proposed-behavior
    attributes:
      label: Proposed behavior
      description: Describe how SAPL should behave after this feature exists.
    validations:
      required: true

  - type: textarea
    id: user-value
    attributes:
      label: User value
      description: Explain who benefits and why this belongs in SAPL.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe workarounds, external tools, or other designs you considered.
    validations:
      required: false

  - type: checkboxes
    id: compatibility
    attributes:
      label: Compatibility impact
      options:
        - label: This may introduce or require a breaking change.
        - label: This may affect policy syntax or evaluation semantics.
        - label: This may affect public Java APIs, CLI commands, or configuration.
    validations:
      required: false
