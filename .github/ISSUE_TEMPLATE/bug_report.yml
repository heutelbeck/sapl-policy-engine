name: "🐞 Bug Report"
description: "Report a bug in this project."
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Search open and closed issues before submitting a new bug report.
        Do not report security vulnerabilities here. Use GitHub Security Advisories or the process in SECURITY.md.

  - type: checkboxes
    id: security-check
    attributes:
      label: Security check
      options:
        - label: This is not a security vulnerability.
          required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      options:
        - Policy language or parser
        - PDP engine
        - SAPL Node or CLI
        - Spring integration
        - Remote PDP client
        - Testing DSL or Maven plugin
        - Language server or editor support
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: sapl-version
    attributes:
      label: SAPL version
      description: "Example: 4.1.0 or 4.2.0-SNAPSHOT"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      description: "Example: OpenJDK 21.0.6"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Operating system and deployment mode
      description: "Example: Ubuntu 24.04, Docker image, DEB package, embedded library, or Windows CLI"
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: What happened?
      description: Describe the observed behavior, including the relevant error message or decision result.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: What did you expect?
      description: Describe the expected behavior.
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Provide reproduction steps and a minimal policy, subscription, command, configuration, sample project, or failing test case.
      placeholder: |
        1. Given this policy/configuration/test case: ...
        2. Run this command or request: ...
        3. Observe this result: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste relevant logs, stack traces, CLI output, or PDP decisions. Remove secrets first.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add links, screenshots, or related issues if useful.
    validations:
      required: false
