name: "❓ Question or Support Request"
description: "Questions and requests for support."
labels: ["question"]

body:
  - type: markdown
    attributes:
      value: |
        Search open and closed issues before submitting a question.
        For informal discussion, Discord may be a faster fit.

  - type: input
    id: sapl-version
    attributes:
      label: SAPL version
      description: "Example: 4.1.0 or 4.2.0-SNAPSHOT"
    validations:
      required: false

  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe what you are trying to understand or accomplish.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include the relevant policy, command, configuration, framework, or deployment mode.
    validations:
      required: true

  - type: textarea
    id: docs-checked
    attributes:
      label: What have you checked?
      description: Link the README, documentation page, example, or issue you already reviewed.
    validations:
      required: true
