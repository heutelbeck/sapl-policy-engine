name: "🔧 Enhancement Request"
description: "Request an enhancement for this project."
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: Search open and closed issues before submitting an enhancement request.

  - type: textarea
    id: current-friction
    attributes:
      label: Current friction
      description: Describe the limitation, maintenance burden, or unclear behavior.
    validations:
      required: true

  - type: textarea
    id: proposed-improvement
    attributes:
      label: Proposed improvement
      description: Describe the concrete change you want.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List affected modules, APIs, docs, or deployment modes if known.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe workarounds or other designs you considered.
    validations:
      required: false

  - type: checkboxes
    id: impact
    attributes:
      label: Expected impact
      options:
        - label: This may require documentation updates.
        - label: This may require new or changed tests.
        - label: This may affect public APIs or configuration.
    validations:
      required: false
