<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPL Embed Test</title>
    <link rel="icon" href="data:,">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        h1 { color: #89b4fa; }
    </style>
</head>
<body>

<h1>SAPL Embed Test</h1>

<h2>Static code block (sapl-code)</h2>
<sapl-code>
    <pre class="sapl-fallback"><code>policy "read only"
permit
  action == "read";</code></pre>
</sapl-code>

<h2>Interactive demo (sapl-demo)</h2>
<sapl-demo>
    <pre class="sapl-fallback"><code>policy "example"
permit
  time.secondOf(&lt;time.now&gt;) % 5 &lt; 2;</code></pre>
    <script type="sapl/policy">
policy "example"
permit
  time.secondOf(<time.now>) % 5 < 2;
    </script>
    <script type="sapl/subscription">
{"subject":"alice","action":"read","resource":"document"}
    </script>
</sapl-demo>

<script type="module" src="http://localhost:8080/embed/sapl-embed.js"></script>

</body>
</html>
