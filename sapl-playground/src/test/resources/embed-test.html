<h1>SAPL Web Component Embed Test</h1>
<p>This page validates embedding a Vaadin-exported web component into static HTML.
   The component lazy-loads when the user clicks the placeholder.</p>

<sapl-demo>
    <script type="sapl/policy">
policy "example"
permit
  time.secondOf(<time.now>) % 5 < 2;
    </script>
    <script type="sapl/subscription">
{
  "subject": "alice",
  "action": "read",
  "resource": "document"
}
    </script>
</sapl-demo>

<script type="module" src="http://localhost:8080/embed/sapl-embed.js"></script>

</body>
